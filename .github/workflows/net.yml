name: Build NetSecureBotChat

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 8
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore
      run: dotnet restore "Net Bot App.csproj"

    - name: Build
      run: dotnet build "Net Bot App.csproj" --configuration Release --no-restore

    - name: Publish
      run: dotnet publish "Net Bot App.csproj" --configuration Release --output publish

    - name: Upload Build
      uses: actions/upload-artifact@v4
      with:
        name: NetSecureBotChat
        path: publish
