name: Build NetSecureBotChat

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:

    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build "Net Bot App.csproj" --configuration Release --no-restore -p:EnableWindowsTargeting=true

    - name: Upload Build
      uses: actions/upload-artifact@v4
      with:
        name: NetSecureBotChat
        path: |
          **/bin/Release/**
